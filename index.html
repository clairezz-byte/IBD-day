<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IBD Day · 自在如风</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    :root {
      --blue-50: #EFF6FF;
      --blue-100: #DBEAFE;
      --blue-200: #BFDBFE;
      --blue-300: #93C5FD;
      --blue-400: #60A5FA;
      --blue-500: #3B82F6;
      --blue-600: #2563EB;
      --blue-700: #1D4ED8;
      --blue-glow: rgba(59, 130, 246, 0.3);
      --shadow-sm: 0 2px 12px rgba(59, 130, 246, 0.12);
      --shadow-md: 0 6px 24px rgba(59, 130, 246, 0.18);
      --shadow-lg: 0 12px 40px rgba(59, 130, 246, 0.25);
      --shadow-xl: 0 20px 60px rgba(59, 130, 246, 0.32);
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 28px;
      --radius-xl: 40px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      min-height: 100vh; min-height: 100dvh;
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(160deg, #EFF6FF 0%, #DBEAFE 30%, #BFDBFE 60%, #93C5FD 100%);
      color: #1E3A5F; overflow-x: hidden;
    }
    .bg-decoration { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .bg-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(147, 197, 253, 0.5), transparent); animation: floatBubble 8s ease-in-out infinite; }
    .bg-circle:nth-child(1) { width: 300px; height: 300px; top: -80px; right: -80px; animation-delay: 0s; }
    .bg-circle:nth-child(2) { width: 200px; height: 200px; bottom: 10%; left: -60px; animation-delay: 2s; }
    .bg-circle:nth-child(3) { width: 150px; height: 150px; top: 40%; right: 5%; animation-delay: 4s; background: radial-gradient(circle, rgba(96, 165, 250, 0.3), transparent); }
    .bg-circle:nth-child(4) { width: 250px; height: 250px; bottom: -60px; right: 20%; animation-delay: 1s; }
    @keyframes floatBubble { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } }
    .app-container { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; padding: 0 16px 100px; }
    .header { text-align: center; padding: 32px 0 16px; }
    .header-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.8); padding: 6px 16px; border-radius: 50px; font-size: 12px; font-weight: 500; color: var(--blue-600); margin-bottom: 16px; box-shadow: var(--shadow-sm); }
    .header-badge .dot { width: 6px; height: 6px; background: var(--blue-500); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.4); } }
    .header h1 { font-size: 28px; font-weight: 900; background: linear-gradient(135deg, #1D4ED8, #3B82F6, #60A5FA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.2; margin-bottom: 6px; }
    .header p { font-size: 14px; color: #5B8DB8; font-weight: 300; }
    .step-indicator { display: flex; align-items: center; justify-content: center; gap: 0; margin: 20px 0; }
    .step-dot-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .step-dot { width: 36px; height: 36px; border-radius: 50%; background: rgba(255, 255, 255, 0.5); border: 2px solid rgba(59, 130, 246, 0.25); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #7BAFD4; transition: var(--spring); position: relative; }
    .step-dot.active { background: linear-gradient(135deg, #2563EB, #3B82F6); border-color: #2563EB; color: white; box-shadow: 0 4px 16px rgba(37, 99, 235, 0.45); transform: scale(1.15); }
    .step-dot.done { background: linear-gradient(135deg, #1D4ED8, #60A5FA); border-color: #1D4ED8; color: white; }
    .step-label { font-size: 10px; color: #7BAFD4; font-weight: 400; white-space: nowrap; }
    .step-label.active { color: var(--blue-600); font-weight: 600; }
    .step-connector { width: 32px; height: 2px; background: rgba(59, 130, 246, 0.2); margin-bottom: 20px; transition: var(--transition); }
    .step-connector.done { background: linear-gradient(90deg, #1D4ED8, #60A5FA); }
    .step-panel { display: none; animation: fadeSlideIn 0.4s ease; }
    .step-panel.active { display: block; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .step-title { font-size: 18px; font-weight: 700; color: #1E3A5F; margin-bottom: 4px; }
    .step-subtitle { font-size: 13px; color: #7BAFD4; margin-bottom: 20px; }
    .lifestyle-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 24px; }
    .lifestyle-card { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 4px 10px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 2px solid rgba(255, 255, 255, 0.8); border-radius: var(--radius-md); cursor: pointer; transition: var(--spring); box-shadow: var(--shadow-sm); user-select: none; }
    .lifestyle-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .lifestyle-card.selected { background: linear-gradient(135deg, rgba(37, 99, 235, 0.12), rgba(59, 130, 246, 0.18)); border-color: var(--blue-400); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25), var(--shadow-md); transform: scale(1.08); }
    .lifestyle-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 24px; line-height: 1; }
    .lifestyle-label { font-size: 10px; font-weight: 600; color: #3A5A7C; text-align: center; line-height: 1.2; }
    .lifestyle-card.selected .lifestyle-label { color: var(--blue-600); }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 16px; border: none; border-radius: var(--radius-xl); font-family: 'Noto Sans SC', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: var(--spring); position: relative; overflow: hidden; }
    .btn-primary { background: linear-gradient(135deg, #2563EB, #3B82F6); color: white; box-shadow: 0 8px 24px rgba(37, 99, 235, 0.38); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(37, 99, 235, 0.48); }
    .btn-primary:active { transform: translateY(0) scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary { background: rgba(255, 255, 255, 0.6); color: var(--blue-600); border: 2px solid rgba(59, 130, 246, 0.25); backdrop-filter: blur(8px); }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.85); transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--blue-600); font-size: 14px; font-weight: 500; padding: 10px; }
    .upload-zone { border: 2px dashed rgba(59, 130, 246, 0.35); border-radius: var(--radius-lg); padding: 32px 20px; text-align: center; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(8px); transition: var(--transition); cursor: pointer; margin-bottom: 20px; position: relative; }
    .upload-zone.drag-over { border-color: var(--blue-500); background: rgba(59, 130, 246, 0.08); transform: scale(1.02); }
    .upload-zone.has-preview { padding: 12px; border-style: solid; border-color: rgba(59, 130, 246, 0.45); }
    .upload-icon { width: 56px; height: 56px; margin: 0 auto 12px; background: linear-gradient(135deg, rgba(59, 130, 246, 0.18), rgba(37, 99, 235, 0.1)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--blue-500); }
    .upload-zone h3 { font-size: 15px; font-weight: 600; color: #3A5A7C; margin-bottom: 4px; }
    .upload-zone p { font-size: 12px; color: #7BAFD4; }
    .upload-preview { width: 100%; max-height: 260px; object-fit: contain; border-radius: var(--radius-md); display: none; }
    .upload-zone.has-preview .upload-preview { display: block; }
    .upload-zone.has-preview .upload-content { display: none; }
    .preview-remove { position: absolute; top: 8px; right: 8px; width: 32px; height: 32px; border-radius: 50%; background: rgba(255, 255, 255, 0.9); border: none; cursor: pointer; display: none; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); z-index: 2; }
    .upload-zone.has-preview .preview-remove { display: flex; }
    #fileInput { display: none; }
    .preview-container { display: none; flex-direction: column; align-items: center; gap: 16px; animation: fadeSlideIn 0.5s ease; }
    .preview-container.visible { display: flex; }
    .result-image { width: 100%; max-width: 400px; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-xl); }
    .result-image img { width: 100%; display: block; }
    .loader-overlay { display: none; position: fixed; inset: 0; background: rgba(239, 246, 255, 0.95); backdrop-filter: blur(8px); z-index: 100; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .loader-overlay.visible { display: flex; }
    .loader-spinner { width: 64px; height: 64px; border: 4px solid rgba(59, 130, 246, 0.18); border-top-color: var(--blue-500); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 16px; font-weight: 600; color: var(--blue-600); }
    .loader-sub { font-size: 13px; color: #7BAFD4; margin-top: -10px; }
    .loader-progress-wrap { width: 220px; height: 6px; background: rgba(59, 130, 246, 0.15); border-radius: 3px; overflow: hidden; }
    .loader-progress-bar { height: 100%; background: linear-gradient(90deg, #2563EB, #60A5FA); border-radius: 3px; transition: width 0.5s ease; width: 0%; }
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(30, 58, 95, 0.9); color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 500; opacity: 0; transition: var(--transition); z-index: 200; pointer-events: none; white-space: nowrap; backdrop-filter: blur(8px); }
    .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(147, 197, 253, 0.4); padding: 12px 20px; padding-bottom: max(12px, env(safe-area-inset-bottom)); z-index: 50; display: flex; gap: 10px; max-width: 480px; margin: 0 auto; }
    .footer-tip { text-align: center; font-size: 11px; color: #7BAFD4; margin-top: 16px; opacity: 0.8; }
    @media (max-width: 360px) { .lifestyle-grid { gap: 6px; } .lifestyle-card { padding: 10px 2px 8px; } .lifestyle-icon { width: 30px; height: 30px; font-size: 20px; } .lifestyle-label { font-size: 9px; } }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.25); border-radius: 2px; }
    .selected-display { display: flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(8px); padding: 10px 16px; border-radius: var(--radius-md); margin-bottom: 20px; border: 1px solid rgba(59, 130, 246, 0.15); }
    .selected-display-icon { font-size: 28px; }
    .selected-display-text { font-size: 14px; font-weight: 600; color: #1E3A5F; }
    .selected-display-sub { font-size: 11px; color: #7BAFD4; }
    .ai-badge { display: inline-flex; align-items: center; gap: 4px; background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(59, 130, 246, 0.15)); border: 1px solid rgba(37, 99, 235, 0.2); padding: 4px 10px; border-radius: 50px; font-size: 11px; color: var(--blue-600); font-weight: 500; }
    .result-tips { font-size: 12px; color: #7BAFD4; text-align: center; margin-top: 8px; }
    .err-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); padding: 4px 10px; border-radius: 50px; font-size: 11px; color: #dc2626; font-weight: 500; margin-top: 6px; }
  </style>
</head>
<body>

<div class="bg-decoration">
  <div class="bg-circle"></div>
  <div class="bg-circle"></div>
  <div class="bg-circle"></div>
  <div class="bg-circle"></div>
</div>

<div class="loader-overlay" id="loader">
  <div class="loader-spinner"></div>
  <div class="loader-text" id="loaderText">AI 正在生成…</div>
  <div class="loader-sub" id="loaderSub">预计 30-60 秒</div>
  <div class="loader-progress-wrap"><div class="loader-progress-bar" id="progressBar"></div></div>
</div>

<div class="toast" id="toast"></div>

<div class="app-container">

  <div class="header">
    <div class="header-badge">
      <span class="dot"></span>
      IBD Day · 世界炎症性肠病日
    </div>
    <h1>自在如风<br>自在100分</h1>
    <p>选择你的生活方式，生成专属海报</p>
  </div>

  <div class="step-indicator">
    <div class="step-dot-wrap"><div class="step-dot active" id="dot1">①</div><span class="step-label active" id="label1">选生活</span></div>
    <div class="step-connector" id="conn1"></div>
    <div class="step-dot-wrap"><div class="step-dot" id="dot2">②</div><span class="step-label" id="label2">上传照</span></div>
    <div class="step-connector" id="conn2"></div>
    <div class="step-dot-wrap"><div class="step-dot" id="dot3">③</div><span class="step-label" id="label3">AI生成</span></div>
    <div class="step-connector" id="conn3"></div>
    <div class="step-dot-wrap"><div class="step-dot" id="dot4">④</div><span class="step-label" id="label4">保存</span></div>
  </div>

  <!-- 步骤1 -->
  <div class="step-panel active" id="panel1">
    <div class="step-title">✨ 选择你的生活方式</div>
    <div class="step-subtitle">选择一个最代表你的生活方式</div>
    <div class="lifestyle-grid" id="lifestyleGrid"></div>
    <button class="btn btn-primary" id="btnStep1" disabled>
      <span>下一步 · 上传照片</span>
      <i data-lucide="arrow-right"></i>
    </button>
  </div>

  <!-- 步骤2 -->
  <div class="step-panel" id="panel2">
    <div class="step-title">📸 上传你的照片</div>
    <div class="step-subtitle">上传一张清晰的正面照片，AI 将为你生成专属形象</div>
    <div class="selected-display" id="selectedDisplay" style="display:none">
      <span class="selected-display-icon" id="selectedIcon"></span>
      <div><div class="selected-display-text" id="selectedText"></div><div class="selected-display-sub">已选择</div></div>
    </div>
    <div class="upload-zone" id="uploadZone">
      <button class="preview-remove" id="previewRemove">
        <i data-lucide="x" style="width:16px;height:16px;color:#3A5A7C"></i>
      </button>
      <div class="upload-content">
        <div class="upload-icon">
          <i data-lucide="image-plus" style="width:28px;height:28px"></i>
        </div>
        <h3>点击或拖拽上传</h3>
        <p>支持 JPG、PNG，建议正面照</p>
      </div>
      <img class="upload-preview" id="uploadPreview" alt="预览" />
    </div>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" />
    <div class="footer-tip">
      <span class="ai-badge"><i data-lucide="sparkles" style="width:12px;height:12px"></i> AI 实时处理，保护隐私</span>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-secondary" id="btnBack2" style="flex:1">
        <i data-lucide="arrow-left" style="width:16px;height:16px"></i> 返回
      </button>
      <button class="btn btn-primary" id="btnStep2" disabled style="flex:3">
        <span>✨ AI 生成海报</span>
      </button>
    </div>
  </div>

  <!-- 步骤3 -->
  <div class="step-panel" id="panel3">
    <div class="step-title">🎉 你的专属海报</div>
    <div class="step-subtitle">IBD Day · 自在如风 · 自在100分</div>
    <div class="preview-container" id="previewContainer">
      <div class="result-image">
        <img id="resultImage" src="" alt="生成结果" />
      </div>
      <div class="result-tips">长按图片可保存到相册</div>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn btn-secondary" id="btnBack3" style="flex:1">
        <i data-lucide="arrow-left" style="width:16px;height:16px"></i> 重拍
      </button>
      <button class="btn btn-primary" id="btnDownload" style="flex:3">
        <i data-lucide="download" style="width:16px;height:16px"></i> 保存到相册
      </button>
    </div>
    <button class="btn btn-ghost" id="btnRestart" style="margin-top:8px">
      <i data-lucide="rotate-ccw" style="width:14px;height:14px"></i> 重新开始
    </button>
  </div>

</div>

<div class="bottom-nav" style="pointer-events:none"></div>

<script>
  // =============================================
  // 生活方式配置
  // =============================================
  const lifestyles = [
    { id: 'flowers',   label: '种花',   emoji: '🌸', prompt: 'standing in a beautiful garden surrounded by colorful flowers and plants, cheerful smile, natural sunlight, vibrant atmosphere' },
    { id: 'basketball',label: '篮球',   emoji: '🏀', prompt: 'playing basketball in a sports gym, dynamic pose with basketball, athletic energy, modern sportswear' },
    { id: 'running',   label: '跑步',   emoji: '🏃', prompt: 'running outdoors in a park, energetic pose, morning sunlight, casual athletic clothes, fresh air' },
    { id: 'badminton', label: '羽毛球', emoji: '🏸', prompt: 'playing badminton on a court, sporty pose holding racket, energetic and active, outdoor setting' },
    { id: 'reading',   label: '读书',   emoji: '📚', prompt: 'reading a book in a cozy library, peaceful and focused expression, warm ambient lighting, intellectual atmosphere' },
    { id: 'cooking',   label: '做饭',   emoji: '🍳', prompt: 'cooking in a modern kitchen, smiling cheerfully, fresh ingredients around, warm home kitchen atmosphere' },
    { id: 'tea',       label: '品茶',   emoji: '🍵', prompt: 'enjoying tea ceremony in a zen tea room, serene expression, traditional chinese tea culture, peaceful atmosphere' },
    { id: 'hiking',    label: '爬山',   emoji: '⛰️', prompt: 'hiking on a mountain trail, triumphant pose at scenic viewpoint, fresh mountain air, outdoor adventure' },
    { id: 'tennis',   label: '网球',   emoji: '🎾', prompt: 'playing tennis on a court, sporty dynamic pose with tennis racket, energetic, outdoor sunny day' },
    { id: 'yoga',      label: '瑜伽',   emoji: '🧘', prompt: 'practicing yoga on a beach at sunset, peaceful and balanced, ocean waves background, serene mood' },
  ];

  // =============================================
  // 状态
  // =============================================
  let currentStep = 1;
  let selectedLifestyle = null;
  let uploadedImageFile = null;
  let uploadedImageUrl = null;
  let generatedImageUrl = null;
  let currentTaskId = null;
  let pollTimer = null;

  // =============================================
  // Netlify Function 代理调用
  // =============================================
  async function callProxy(action, payload) {
    const resp = await fetch('/.netlify/functions/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, ...payload })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp.json();
  }

  // =============================================
  // 核心生成流程
  // =============================================
  async function generatePoster() {
    if (!selectedLifestyle || !uploadedImageFile) {
      showToast('请先选择生活方式并上传照片');
      return;
    }

    showLoader('准备生成…', '上传图片中…');

    try {
      // Step 1: 转 base64 并上传
      updateLoader('上传图片…', 10);
      const imageBase64 = await fileToBase64(uploadedImageFile);
      let imageUrl;

      try {
        const uploadResult = await callProxy('upload', {
          imageBase64,
          filename: uploadedImageFile.name
        });
        if (uploadResult.error) throw new Error(uploadResult.error);
        imageUrl = uploadResult.url;
        updateLoader('图片已上传…', 25);
      } catch (uploadErr) {
        console.error('Upload failed:', uploadErr);
        // Fallback: 使用一个已验证可用的图片 URL
        imageUrl = 'https://liblibai-tmp-image.liblib.cloud/img/480d2852559b4a858bb8f8f77f3d6d4a/780cfee89b49b23d87090e770473e727f91296c4bf7749ae7b5472bc3da3c24e.png';
        showToast('图片上传失败，使用默认图片演示');
      }

      // Step 2: 提交生成任务
      updateLoader('提交给 AI…', 35);
      let taskId;
      try {
        const genResult = await callProxy('generate', { imageUrl });
        if (genResult.error) throw new Error(genResult.error);
        taskId = genResult.taskId;
      } catch (genErr) {
        console.error('Generate failed:', genErr);
        // 如果是 demo 环境（没有真实 Netlify），直接用已知可用的 task
        showToast('演示模式：显示示例结果');
        setTimeout(() => {
          hideLoader();
          displayResult('https://liblibai-tmp-image.liblib.cloud/img/480d2852559b4a858bb8f8f77f3d6d4a/9d88e4ed96da0afaec1b4de44bb76e681b388ef7bd30f427b04bd8332d23d3a4.png');
        }, 1000);
        return;
      }

      currentTaskId = taskId;
      updateLoader('AI 生成中…', 40);

      // Step 3: 轮询结果
      let attempts = 0;
      async function poll() {
        if (!currentTaskId) return;
        try {
          const result = await callProxy('poll', { taskId: currentTaskId });
          const status = result.status;
          const progress = Math.min((result.progress || 0) * 100, 98);
          updateLoader(`AI 生成中… ${Math.round(progress)}%`, 40 + progress * 0.5);

          if (status === 2 || status === 3 || status === 4) {
            attempts++;
            if (attempts < 50) setTimeout(poll, 8000);
          } else if (status === 5) {
            setProgress(100);
            updateLoader('生成完成！', 100);
            setTimeout(() => {
              hideLoader();
              if (result.images && result.images.length > 0) {
                const img = result.images[0];
                const imgUrl = typeof img === 'string' ? img : img.imageUrl;
                displayResult(imgUrl);
              } else {
                showToast('生成成功但未返回图片');
              }
            }, 500);
          } else if (status === 6) {
            hideLoader();
            showToast('AI 生成失败: ' + (result.error || '内容违规'));
          } else {
            attempts++;
            if (attempts < 50) setTimeout(poll, 8000);
            else { hideLoader(); showToast('生成超时，请重试'); }
          }
        } catch (err) {
          console.error('Poll error:', err);
          attempts++;
          if (attempts < 50) setTimeout(poll, 10000);
          else { hideLoader(); showToast('查询失败，请检查网络'); }
        }
      }
      setTimeout(poll, 3000);

    } catch (err) {
      console.error('生成失败:', err);
      hideLoader();
      showToast(err.message || '生成失败，请稍后重试');
    }
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function displayResult(imgUrl) {
    generatedImageUrl = imgUrl;
    document.getElementById('resultImage').src = imgUrl;
    document.getElementById('previewContainer').classList.add('visible');
    goToStep(3);
  }

  function downloadResult() {
    if (!generatedImageUrl) { showToast('请先生成海报'); return; }
    const link = document.createElement('a');
    link.download = `IBD-Day-自在如风-${selectedLifestyle?.label || '海报'}.png`;
    link.href = generatedImageUrl;
    link.target = '_blank';
    link.click();
    showToast('✅ 建议长按图片保存，或右键另存为');
  }

  // =============================================
  // UI 工具
  // =============================================
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), 3500);
  }

  function setProgress(pct) {
    const bar = document.getElementById('progressBar');
    if (bar) bar.style.width = pct + '%';
  }

  function showLoader(text, sub) {
    document.getElementById('loaderText').textContent = text || 'AI 正在生成…';
    document.getElementById('loaderSub').textContent = sub || '预计 30-60 秒';
    setProgress(0);
    document.getElementById('loader').classList.add('visible');
  }

  function updateLoader(text, pct) {
    if (text) document.getElementById('loaderText').textContent = text;
    if (pct !== undefined) setProgress(pct);
    const sub = document.getElementById('loaderSub');
    if (pct !== undefined && pct >= 40) sub.textContent = '请耐心等待…';
  }

  function hideLoader() {
    document.getElementById('loader').classList.remove('visible');
    setProgress(0);
  }

  function goToStep(step) {
    document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel${step}`).classList.add('active');
    for (let i = 1; i <= 4; i++) {
      const dot = document.getElementById(`dot${i}`);
      const label = document.getElementById(`label${i}`);
      dot.classList.remove('active', 'done');
      label.classList.remove('active');
      if (i < step) dot.classList.add('done');
      else if (i === step) { dot.classList.add('active'); label.classList.add('active'); }
    }
    for (let i = 1; i <= 3; i++) document.getElementById(`conn${i}`).classList.toggle('done', i < step);
    currentStep = step;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // =============================================
  // 初始化
  // =============================================
  lucide.createIcons();

  function buildGrid() {
    const grid = document.getElementById('lifestyleGrid');
    lifestyles.forEach(ls => {
      const card = document.createElement('div');
      card.className = 'lifestyle-card';
      card.dataset.id = ls.id;
      card.innerHTML = `<div class="lifestyle-icon">${ls.emoji}</div><div class="lifestyle-label">${ls.label}</div>`;
      card.addEventListener('click', () => {
        document.querySelectorAll('.lifestyle-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedLifestyle = ls;
        document.getElementById('btnStep1').disabled = false;
        document.getElementById('selectedIcon').textContent = ls.emoji;
        document.getElementById('selectedText').textContent = ls.label;
        document.getElementById('selectedDisplay').style.display = 'flex';
      });
      grid.appendChild(card);
    });
  }

  // =============================================
  // 图片上传
  // =============================================
  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');
  const uploadPreview = document.getElementById('uploadPreview');
  const previewRemove = document.getElementById('previewRemove');

  uploadZone.addEventListener('click', (e) => {
    if (e.target !== previewRemove && !previewRemove.contains(e.target)) fileInput.click();
  });
  uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault(); uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
  previewRemove.addEventListener('click', (e) => { e.stopPropagation(); clearUpload(); });

  function handleFile(file) {
    if (file.size > 10 * 1024 * 1024) { showToast('图片大小不能超过 10MB'); return; }
    uploadedImageFile = file;
    const reader = new FileReader();
    reader.onload = (e) => {
      uploadPreview.src = e.target.result;
      uploadedImageUrl = e.target.result;
      uploadZone.classList.add('has-preview');
      document.getElementById('btnStep2').disabled = false;
    };
    reader.onerror = () => showToast('图片读取失败');
    reader.readAsDataURL(file);
  }

  function clearUpload() {
    uploadedImageFile = null;
    uploadedImageUrl = null;
    fileInput.value = '';
    uploadPreview.src = '';
    uploadZone.classList.remove('has-preview');
    document.getElementById('btnStep2').disabled = true;
  }

  // =============================================
  // 重置
  // =============================================
  function resetAll() {
    if (pollTimer) clearTimeout(pollTimer);
    currentTaskId = null;
    generatedImageUrl = null;
    clearUpload();
    selectedLifestyle = null;
    document.querySelectorAll('.lifestyle-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('btnStep1').disabled = true;
    document.getElementById('previewContainer').classList.remove('visible');
    document.getElementById('selectedDisplay').style.display = 'none';
    goToStep(1);
  }

  // =============================================
  // 事件绑定
  // =============================================
  document.getElementById('btnStep1').addEventListener('click', () => goToStep(2));
  document.getElementById('btnBack2').addEventListener('click', () => goToStep(1));
  document.getElementById('btnStep2').addEventListener('click', () => generatePoster());
  document.getElementById('btnBack3').addEventListener('click', () => {
    document.getElementById('previewContainer').classList.remove('visible');
    goToStep(2);
  });
  document.getElementById('btnDownload').addEventListener('click', downloadResult);
  document.getElementById('btnRestart').addEventListener('click', resetAll);

  buildGrid();
  lucide.createIcons();
</script>
</body>
</html>
